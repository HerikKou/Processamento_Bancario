spring.application.name=ServicePagamento


spring.datasource.url=jdbc:mysql://mysql:3306/pagamentoservice
spring.kafka.bootstrap-servers=kafka:9092
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update



spring.kafka.consumer.group-id=service-pagamento-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.value.default.type=Pagamento.ServicePagamento.DTO.TransacaoRealizadaDTO

spring.kafka.consumer.properties.spring.json.value.type.mappings=Transacao.ServiceTransacao.DTO.TransacaoEventoDTO:Pagamento.ServicePagamento.DTO.TransacaoRealizadaDTO

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false

logging.level.org.springframework.kafka=INFO
logging.level.comconsumerNotificacao=DEBUG

server.port=8084
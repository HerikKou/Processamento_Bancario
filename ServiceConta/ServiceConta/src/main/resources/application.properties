spring.application.name=ServiceConta
spring.datasource.url=jdbc:mysql://mysql:3306/contaservice
spring.kafka.bootstrap-servers=kafka:9092
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update



spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=service-conta-group-v2
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.value.default.type=Conta.ServiceConta.DTO.ClienteCriadoEventoDTO

spring.kafka.consumer.properties.spring.json.value.type.mappings=Cliente.ServiceCliente.DTO.ClienteEventoDTO:Conta.ServiceConta.DTO.ClienteCriadoEventoDTO

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false

logging.level.org.springframework.kafka=INFO
logging.level.comconsumerNotificacao=DEBUG

server.port=8082